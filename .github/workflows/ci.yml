name: CI

on:
  workflow_call:

jobs:
  lint-and-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        name: Checkout code
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        name: Setup Bun
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint & typecheck
        run: bun run lint
